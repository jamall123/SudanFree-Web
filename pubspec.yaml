name: sudan_free
description: A freelance marketplace for Sudan - connecting freelancers with clients.
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  cloud_functions: ^5.6.2
  google_sign_in: ^6.2.2   # Keep at v6 — v7 requires new serverClientId config
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage / Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4
  
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  image: ^4.3.0
  path_provider: ^2.1.5
  
  # UI Components
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  http: ^1.2.2
  
  # Video (مجمد مؤقتاً)
  # video_player: ^2.9.2
  
  # Icons
  cupertino_icons: ^1.0.8
  cloudinary_public: ^0.23.1
  photo_view: ^0.15.0
  share_plus: ^10.1.4
  package_info_plus: ^8.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  onesignal_flutter: ^5.4.1
  device_info_plus: ^12.3.0
  record: ^5.2.0
  audioplayers: ^6.1.1
  path: ^1.9.1
  pinput: ^5.0.0
  file_picker: ^11.0.2
  firebase_analytics: ^11.6.0
  connectivity_plus: ^7.1.1
  video_player: ^2.11.1
  visibility_detector: ^0.4.0+2
  flutter_cache_manager: ^3.4.1
  app_links: ^7.0.0
  open_file: ^3.5.10
  permission_handler: ^11.4.0
  flutter_map_marker_cluster: ^1.3.6
  flutter_facebook_auth: ^7.1.6
  qr_flutter: ^4.1.0
  flutter_linkify: ^6.0.0
  any_link_preview: ^3.0.3
  flutter_image_compress: ^2.4.0
  universal_io: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7
  rename: ^3.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "sudan.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1a6b6b"
  adaptive_icon_foreground: "sudan.jpg"

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

dependency_overrides:
  record_linux: ^1.3.0
  record_platform_interface: ^1.5.0
