version: "2"
type: backend
tech_stack:
  - Dart
  - Flutter
  - Firebase (Auth, Firestore, Storage, Messaging)
  - Cloudinary
  - Node.js (Cloud Functions)
  - Provider (State Management)
  - Hive (Local Cache)
features:
  - name: Authentication
    description: User authentication via Google Sign-In, Email/Password, and Phone OTP
    files:
      - lib/services/auth_service.dart
      - lib/providers/auth_provider.dart
      - lib/views/auth/register_screen.dart
      - lib/views/auth/profile_setup_screen.dart
    endpoints:
      - method: POST
        path: /auth/signInWithGoogle
        description: Sign in with Google OAuth
        auth_required: false
        response_schema:
          "200": UserCredential
          "400": Authentication error
      - method: POST
        path: /auth/signUpWithEmail
        description: Register with email and password
        auth_required: false
        request_schema:
          body:
            email: string
            password: string
        response_schema:
          "200": UserCredential
          "400": Validation error
      - method: POST
        path: /auth/signInWithEmail
        description: Login with email and password
        auth_required: false
        request_schema:
          body:
            email: string
            password: string
        response_schema:
          "200": UserCredential
          "401": Invalid credentials
      - method: POST
        path: /auth/signOut
        description: Sign out current user
        auth_required: true
        response_schema:
          "200": void
      - method: DELETE
        path: /auth/deleteUser
        description: Delete user account and all associated data
        auth_required: true
        response_schema:
          "200": void
          "400": Requires recent login
      - method: POST
        path: /auth/resetPassword
        description: Send password reset email
        auth_required: false
        request_schema:
          body:
            email: string
        response_schema:
          "200": void
    depends_on: []

  - name: User Management
    description: CRUD operations for user profiles
    files:
      - lib/services/firestore_service.dart
      - lib/models/user_model.dart
    endpoints:
      - method: GET
        path: /users/{userId}
        description: Get user profile by ID
        auth_required: true
        response_schema:
          "200": UserModel
          "404": User not found
      - method: PUT
        path: /users/{userId}
        description: Update user profile
        auth_required: true
        request_schema:
          body:
            name: string
            bio: string
            skills: string[]
            location: string
        response_schema:
          "200": void
      - method: GET
        path: /users/freelancers
        description: List freelancers with optional skill filter
        auth_required: true
        response_schema:
          "200": UserModel[]
      - method: GET
        path: /users/shops
        description: List shops with optional category filter
        auth_required: true
        response_schema:
          "200": UserModel[]
      - method: POST
        path: /users/{userId}/partner
        description: Toggle partner relationship between users
        auth_required: true
        response_schema:
          "200": void
    depends_on:
      - Authentication

  - name: Job Management
    description: CRUD operations for job listings
    files:
      - lib/services/firestore_service.dart
      - lib/models/job_model.dart
      - lib/providers/job_provider.dart
    endpoints:
      - method: POST
        path: /jobs
        description: Create a new job listing
        auth_required: true
        request_schema:
          body:
            title: string
            description: string
            budget: number
            category: string
            location: string
        response_schema:
          "200": void
      - method: GET
        path: /jobs
        description: List jobs with filters (category, budget, status)
        auth_required: true
        response_schema:
          "200": JobModel[]
      - method: GET
        path: /jobs/{jobId}
        description: Get job details
        auth_required: true
        response_schema:
          "200": JobModel
          "404": Job not found
      - method: PUT
        path: /jobs/{jobId}
        description: Update job details
        auth_required: true
        response_schema:
          "200": void
      - method: DELETE
        path: /jobs/{jobId}
        description: Delete a job listing
        auth_required: true
        response_schema:
          "200": void
      - method: POST
        path: /jobs/{jobId}/complete
        description: Mark job as completed and update freelancer stats
        auth_required: true
        response_schema:
          "200": void
    depends_on:
      - Authentication
      - User Management

  - name: Proposal Management
    description: Job application system for freelancers
    files:
      - lib/services/firestore_service.dart
      - lib/models/proposal_model.dart
    endpoints:
      - method: POST
        path: /proposals
        description: Submit a proposal for a job
        auth_required: true
        request_schema:
          body:
            jobId: string
            coverLetter: string
            proposedBudget: number
            timeline: string
        response_schema:
          "200": void
      - method: GET
        path: /jobs/{jobId}/proposals
        description: Get all proposals for a job
        auth_required: true
        response_schema:
          "200": ProposalModel[]
      - method: PUT
        path: /proposals/{proposalId}/status
        description: Update proposal status (accept/reject)
        auth_required: true
        response_schema:
          "200": void
      - method: POST
        path: /proposals/{proposalId}/accept
        description: Accept proposal and assign freelancer to job
        auth_required: true
        response_schema:
          "200": void
    depends_on:
      - Job Management
      - Authentication

  - name: Social Posts
    description: Social feed with posts, comments, and reactions
    files:
      - lib/services/firestore_service.dart
      - lib/models/post_model.dart
      - lib/models/comment_model.dart
      - lib/views/posts/post_details_screen.dart
    endpoints:
      - method: POST
        path: /posts
        description: Create a new post
        auth_required: true
        request_schema:
          body:
            content: string
            imageUrls: string[]
            videoUrl: string
        response_schema:
          "200": void
      - method: GET
        path: /posts
        description: Get posts feed
        auth_required: true
        response_schema:
          "200": PostModel[]
      - method: PUT
        path: /posts/{postId}
        description: Update a post
        auth_required: true
        response_schema:
          "200": void
      - method: POST
        path: /posts/{postId}/comments
        description: Add comment to a post
        auth_required: true
        request_schema:
          body:
            text: string
            parentCommentId: string
        response_schema:
          "200": void
      - method: POST
        path: /posts/{postId}/react
        description: Toggle reaction on a post
        auth_required: true
        response_schema:
          "200": void
    depends_on:
      - Authentication
      - User Management

  - name: Chat & Messaging
    description: Real-time messaging between users
    files:
      - lib/services/firestore_service.dart
      - lib/models/message_model.dart
      - lib/views/chat/chat_list_screen.dart
    endpoints:
      - method: POST
        path: /chats
        description: Create or get existing chat between two users
        auth_required: true
        request_schema:
          body:
            user2Id: string
        response_schema:
          "200": ChatDocument
      - method: GET
        path: /chats
        description: Get all user chats
        auth_required: true
        response_schema:
          "200": ChatDocument[]
      - method: GET
        path: /chats/{chatId}/messages
        description: Get chat messages (paginated)
        auth_required: true
        response_schema:
          "200": MessageModel[]
      - method: POST
        path: /chats/{chatId}/messages
        description: Send a message
        auth_required: true
        request_schema:
          body:
            text: string
        response_schema:
          "200": void
      - method: PUT
        path: /chats/{chatId}/read
        description: Mark messages as read
        auth_required: true
        response_schema:
          "200": void
    depends_on:
      - Authentication
      - User Management

  - name: Payment System
    description: Payment tracking between clients and freelancers
    files:
      - lib/services/firestore_service.dart
      - lib/models/payment_model.dart
      - lib/providers/payment_provider.dart
    endpoints:
      - method: POST
        path: /payments
        description: Create a payment record
        auth_required: true
        request_schema:
          body:
            jobId: string
            amount: number
            freelancerId: string
        response_schema:
          "200": void
      - method: GET
        path: /payments/{paymentId}
        description: Get payment details
        auth_required: true
        response_schema:
          "200": PaymentModel
          "404": Payment not found
      - method: PUT
        path: /payments/{paymentId}/status
        description: Update payment status
        auth_required: true
        response_schema:
          "200": void
    depends_on:
      - Job Management
      - Authentication

  - name: Reviews & Ratings
    description: Review system for freelancers and shops
    files:
      - lib/services/firestore_service.dart
      - lib/models/review_model.dart
    endpoints:
      - method: POST
        path: /reviews
        description: Create a review (updates freelancer rating and stats)
        auth_required: true
        request_schema:
          body:
            freelancerId: string
            rating: number
            comment: string
            jobId: string
        response_schema:
          "200": void
      - method: GET
        path: /users/{userId}/reviews
        description: Get reviews for a user
        auth_required: true
        response_schema:
          "200": ReviewModel[]
    depends_on:
      - Job Management
      - User Management

  - name: Push Notifications
    description: Firebase Cloud Functions for push notifications on social interactions
    files:
      - functions/index.js
      - lib/services/notification_service.dart
      - lib/models/notification_model.dart
    endpoints:
      - method: POST
        path: /notifications (Firestore trigger)
        description: Auto-send push notification when notification document is created
        auth_required: false
        response_schema:
          "200": FCM response
    depends_on:
      - User Management

  - name: Report System
    description: Content and user reporting for safety
    files:
      - lib/services/firestore_service.dart
      - lib/models/report_model.dart
      - lib/views/common/report_dialog.dart
    endpoints:
      - method: POST
        path: /reports
        description: Submit a report against content or user
        auth_required: true
        request_schema:
          body:
            reportedId: string
            reason: string
            type: string
        response_schema:
          "200": void
    depends_on:
      - Authentication

  - name: Smart Search
    description: Intelligent search across jobs, freelancers, shops, and posts
    files:
      - lib/services/smart_search_service.dart
    endpoints:
      - method: GET
        path: /search
        description: Search across multiple collections
        auth_required: true
        request_schema:
          query:
            q: string
            type: string
        response_schema:
          "200": SearchResults
    depends_on:
      - User Management
      - Job Management

known_limitations:
  - issue: No server-side input validation for Firestore writes
    location: lib/services/firestore_service.dart
    impact: Relies on client-side validation and Firestore security rules
  - issue: No rate limiting on API calls
    location: lib/services/firestore_service.dart
    impact: Potential for abuse via rapid requests
  - issue: Payment system has no real payment gateway integration
    location: lib/models/payment_model.dart
    impact: Payment tracking only, no actual payment processing
